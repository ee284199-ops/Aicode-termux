name: Build Termux Bootstrap

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io

      - name: Build Bootstrap using Docker
        run: |
          # Fix SDK permissions and ensure dependencies are met before building
          ./scripts/run-docker.sh bash -c "sudo chown -R builder:builder /home/builder/lib/android-sdk-9123335 && ./scripts/setup-android-sdk.sh && ./scripts/build-bootstraps.sh --architectures aarch64"

      - name: Upload Bootstrap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-aarch64
          path: ./*.zip
