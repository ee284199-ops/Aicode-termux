name: Build Termux Bootstrap

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io

      - name: Build Bootstrap using Docker
        run: |
          # Redefine ANDROID_HOME to a writable location and run build
          ./scripts/run-docker.sh bash -c "export ANDROID_HOME=/home/builder/termux-packages/android-sdk; mkdir -p \$ANDROID_HOME; cp -r /home/builder/lib/android-sdk-9123335/* \$ANDROID_HOME/ 2>/dev/null || true; ./scripts/setup-android-sdk.sh && ./scripts/build-bootstraps.sh --architectures aarch64"

      - name: Upload Bootstrap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-aarch64
          path: ./*.zip
