name: Build Bootstrap (com.aicode.studio)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install required tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            curl wget binutils gzip xz-utils zip unzip tar \
            gawk grep sed findutils jq

      - name: Make scripts executable
        run: |
          chmod +x scripts/generate-bootstraps.sh
          chmod +x scripts/properties.sh 2>/dev/null || true

      - name: Generate bootstrap archive
        run: |
          ./scripts/generate-bootstraps.sh --architectures ${{ matrix.arch }}

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: bootstrap-${{ matrix.arch }}.zip
          retention-days: 7
