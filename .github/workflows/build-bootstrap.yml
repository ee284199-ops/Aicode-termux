name: Build Termux Bootstrap (Fast)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set execution permissions
        run: |
          find . -name "*.sh" -o -name "*.py" | xargs chmod +x

      - name: Generate Bootstrap
        run: |
          # Use generate-bootstraps.sh to create bootstrap by downloading pre-built debs.
          # This bypasses the need for Docker/NDK and is much faster.
          ./scripts/generate-bootstraps.sh --architectures aarch64

      - name: Upload Bootstrap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-aarch64
          path: ./*.zip
